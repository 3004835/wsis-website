<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch Menu | West Scranton Intermediate School</title>
  <meta name="description" content="Check the daily breakfast and lunch menus for West Scranton Intermediate School. View nutritious meal options and dining information for our students and families.">

<link rel="icon" href="https://resources.finalsite.net/images/f_auto,q_auto/v1652694965/scrsdorg/usnmmdgpfw3okwrrbkar/_InvaderWAI.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }

body {
  background:#f0f5ff;
  color:#002868;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.branding-bar {
  background:white;
  padding:1.5rem 5%;
  display:flex;
  align-items:center;
}

.logo-img { height:90px; margin-right:20px; }

.school-title h1 { font-size:2.8rem; color:#003399; }
.school-title p { font-size:1.1rem; color:#446ab3; font-weight:600; }

/* NAVBAR */
.nav-bar {
  background:#003399;
  padding:0 5%;
}

.nav-menu { display:flex; list-style:none; }

.nav-item { position:relative; }

.nav-item > a {
  display:block;
  padding:1.2rem 2rem;
  color:white;
  text-decoration:none;
  font-weight:700;
}

.nav-item:hover > a {
  background:#1e4db3;
  color:#ffd700;
}

/* CONTENT */
main {
  flex:1;
  padding:4rem 5%;
}

.menu-card {
  background:white;
  max-width:900px;
  margin:auto;
  padding:2.5rem;
  border-radius:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.menu-card h2 {
  text-align:center;
  font-size:2.5rem;
  margin-bottom:2rem;
  color:#003399;
}

/* DAYS */
.days {
  display:flex;
  justify-content:space-between;
  margin-bottom:2rem;
  flex-wrap:wrap;
}

.day-btn {
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  background:#e6ecff;
  color:#003399;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.day-btn:hover,
.day-btn.active {
  background:#003399;
  color:white;
}

/* MENU DISPLAY */
.menu-display {
  text-align:center;
  font-size:1.4rem;
  font-weight:600;
  padding:2rem;
  background:#f8fbff;
  border-radius:20px;
}

/* FOOTER */
footer {
  background:#002868;
  color:white;
  padding:2rem 5%;
  border-top:5px solid #ffd700;
  text-align:center;
}

  .menu-image-container {
  text-align:center;
}

.menu-image {
  width:100%;
  max-width:700px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  transition:0.3s;
}

.menu-image:hover {
  transform:scale(1.02);
}
  
</style>
</head>

<body>

<!-- HEADER -->
<div class="branding-bar">
  <img src="https://resources.finalsite.net/images/f_auto,q_auto/v1652694965/scrsdorg/usnmmdgpfw3okwrrbkar/_InvaderWAI.png" class="logo-img">
  <div class="school-title">
    <h1>West Scranton Intermediate School</h1>
    <p>Home of the Invaders · Grades 5-8<p>
  </div>
</div>

<!-- NAV -->
<nav class="nav-bar">
  <ul class="nav-menu">
    <li class="nav-item"><a href="index.html">Home</a></li>
    <li class="nav-item"><a href="about.html">About Us</a></li>
    <li class="nav-item"><a href="bell-schedule.html">Bell Schedule</a></li>
    <li class="nav-item"><a href="lunch-menu.html">Lunch Menu</a></li>
  </ul>
</nav>

<!-- MAIN -->
<main>
  <div class="menu-card">
    <h2>Lunch Menu</h2>

    <div class="menu-image-container">
      <img src="menu.png" alt="School Lunch Menu" class="menu-image">
    </div>

  </div>
</main>

<footer>
  <p>West Scranton Intermediate School</p>
</footer>

<!-- SCRIPT -->
<script>
const menus = {
  mon: "🍕 Pizza, Salad, Fruit, Milk",
  tue: "🌮 Tacos, Rice, Beans, Fruit",
  wed: "🍔 Cheeseburger, Fries, Milk",
  thu: "🍝 Spaghetti, Breadstick, Salad",
  fri: "🍗 Chicken Nuggets, Fries, Fruit"
};

function showMenu(day, btn) {
  document.getElementById("menu").textContent = menus[day];

  document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
